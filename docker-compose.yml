# Untuk development lokal saja. Production tetap: Vercel (frontend) + Cloud Run (backend) + Supabase (DB/Auth).

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      # PENTING: Override variabel URL backend di sini.
      # Di dalam Docker, 'localhost' berarti container frontend itu sendiri.
      # Agar Next.js bisa ngobrol dengan FastAPI, ia harus memanggil nama service-nya, yaitu 'backend'.
      - BACKEND_URL=http://backend:8080 
      # Catatan: Sesuaikan 'BACKEND_URL' dengan nama variabel yang kamu pakai di next.config.js/mjs
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend # Memastikan backend menyala lebih dulu sebelum frontend