# Blueprint deploy otomatis untuk Render (opsional, bisa juga setup manual lewat dashboard).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: eduvesting-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
