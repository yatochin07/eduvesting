name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/postgres
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GOOGLE_REDIRECT_URI: http://localhost:3000/login/callback
          FINNHUB_API_KEY: test
          GROQ_API_KEY: test
        run: pytest

  # Render auto-deploy dari koneksi GitHub repo (lihat ROADMAP.md langkah deployment).
  # Job ini men-trigger deploy hook Render secara eksplisit setelah test lolos,
  # sebagai lapisan kontrol tambahan (opsional, bisa dihapus jika auto-deploy Render sudah cukup).
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
